<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YG智能客服</title>
    <style>
        #yg-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 520px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            z-index: 9999;
        }
        #yg-widget.minimized {
            height: 60px;
        }
        #yg-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        #yg-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .message {
            margin-bottom: 12px;
            max-width: 80%;
        }
        .message.user {
            margin-left: auto;
            background: #667eea;
            color: white;
            border-radius: 16px 16px 4px 16px;
            padding: 10px 14px;
        }
        .message.assistant {
            background: #f1f3f4;
            border-radius: 16px 16px 16px 4px;
            padding: 10px 14px;
        }
        #yg-input-area {
            padding: 12px 16px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
        }
        #yg-input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 10px 16px;
            outline: none;
        }
        #yg-input:focus {
            border-color: #667eea;
        }
        #yg-send {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            cursor: pointer;
        }
        #yg-send:disabled {
            background: #ccc;
        }
    </style>
</head>
<body>
    <div id="yg-widget" class="minimized">
        <div id="yg-header" onclick="toggleWidget()">
            <span>🤖 YG智能客服</span>
            <span id="yg-toggle">−</span>
        </div>
        <div id="yg-messages" style="display:none;">
            <div class="message assistant">您好！有什么可以帮助您的吗？</div>
        </div>
        <div id="yg-input-area" style="display:none;">
            <input type="text" id="yg-input" placeholder="输入您的问题..." />
            <button id="yg-send" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script src="widget.js"></script>
    <script>
        window.YGWidget.init({
            apiBase: window.location.origin,
            tenantId: 'default',
            channel: 'webchat',
        });
    </script>
</body>
</html>
