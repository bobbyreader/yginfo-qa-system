# render.yaml - Render 部署配置
# 使用方法：connect render.com to your GitHub repo

services:
  - type: web
    name: yg-knowledge-base
    env: python
    pythonVersion: "3.12"
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: free
    envVars:
      # Database - Supabase PostgreSQL (recommended for production)
      # Format: postgresql://postgres.[ref]:[password]@aws-0-[region].pooler.supabase.com:6543/postgres
      - key: DATABASE_URL
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
        fromGroup: OpenAI
